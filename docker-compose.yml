services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: launchdeck
      POSTGRES_USER: launchdeck
      POSTGRES_PASSWORD: launchdeck_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchdeck"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://launchdeck:launchdeck_dev@db:5432/launchdeck
      DATABASE_URL_SYNC: postgresql://launchdeck:launchdeck_dev@db:5432/launchdeck
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m app.workers.ai_worker
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://launchdeck:launchdeck_dev@db:5432/launchdeck
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001
    depends_on:
      - backend

volumes:
  pgdata:
  ollama_data:
